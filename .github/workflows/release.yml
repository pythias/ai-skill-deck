name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Build Release
        run: swift build -c release

      - name: Create App Bundle
        run: |
          mkdir -p ./build/SkillDeck.app/Contents/MacOS
          mkdir -p ./build/SkillDeck.app/Contents/Resources

          # Copy executable
          cp ./.build/release/SkillDeck ./build/SkillDeck.app/Contents/MacOS/

          # Copy Resources if exists
          if [ -d "./Sources/SkillDeck/Resources" ]; then
            cp -R ./Sources/SkillDeck/Resources/* ./build/SkillDeck.app/Contents/Resources/
          fi

          # Create Info.plist
          cat > ./build/SkillDeck.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>SkillDeck</string>
            <key>CFBundleIdentifier</key>
            <string>com skilldeck.app</string>
            <key>CFBundleName</key>
            <string>SkillDeck</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>1</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          hdiutil create -volname SkillDeck \
            -srcfolder ./build/SkillDeck.app \
            -ov \
            -format UDZO \
            ./build/SkillDeck.dmg

      - name: Generate Checksums
        run: |
          shasum -a 256 ./build/SkillDeck.dmg > ./build/SkillDeck.dmg.sha256
          cat ./build/SkillDeck.dmg.sha256

      - name: Create Zip
        run: |
          zip -r ./build/SkillDeck-macOS.zip ./build/SkillDeck.app

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./build/SkillDeck.dmg
            ./build/SkillDeck.dmg.sha256
            ./build/SkillDeck-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: success
        run: echo "Release ${{ github.ref }} completed successfully"
