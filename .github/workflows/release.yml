name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Generate Xcode Project
        run: swift package generate-xcodeproj

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project SkillDeck.xcodeproj \
            -scheme SkillDeck \
            -configuration Release \
            -archivePath ./build/SkillDeck.xcarchive \
            -destination 'generic/platform=macOS' \
            SKIP_INSTALL=NO

      - name: Create DMG
        run: |
          hdiutil create -volname SkillDeck \
            -srcfolder ./build/SkillDeck.xcarchive/Products/Applications/SkillDeck.app \
            -ov \
            -format UDZO \
            ./build/SkillDeck.dmg

      - name: Generate Checksums
        run: |
          sha256sum ./build/SkillDeck.dmg > ./build/SkillDeck.dmg.sha256
          cat ./build/SkillDeck.dmg.sha256

      - name: Create Zip
        run: |
          zip -r ./build/SkillDeck-macOS.zip ./build/SkillDeck.xcarchive

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./build/SkillDeck.dmg
            ./build/SkillDeck.dmg.sha256
            ./build/SkillDeck-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: success
        run: echo "Release ${{ github.ref }} completed successfully"
